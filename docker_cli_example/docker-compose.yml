
services:
  docker_cli:
    build:
      context: ./docker/
      dockerfile: Dockerfile
      network: host
    user: root
    image: local_image/docker_cli
    volumes:
      - whisper_model_cache:/home/cache/model
      - .:/app/out

    environment:
      - model_save_path=/home/cache/model/hf_model
    env_file:
      - .env

      

volumes:
  whisper_model_cache:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${model_cashe}
