version: '3.91'
services:
  jupyter:
    build:
      context: ./jupyter/
      dockerfile: Dockerfile
      network: host
      args:
        NB_USER: '${user}'
    user: root
    image: local_image/jupyter_fv
    working_dir: /home/${user}/work
    ports:
      - '${juputer_ports}'
    volumes:
      - whisper_model_cache:/home/${user}/cache
      - type: bind
        source: ${notebook_folder}
        target: /home/${user}/work
    privileged: true

    environment:
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - restartable=yes
      - DOCKER_STACKS_JUPYTER_CMD=notebook
      - NB_USER=${user}
      - hugging_token=${hugging_token}
      - model_save_path=/home/${user}/cache/hf_model
      - TORCH_HOME=/home/${user}/cache/torch
      - HF_HOME=/home/${user}/cache/huggingface
      
    command: "start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''"

volumes:
  whisper_model_cache:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${model_cashe}
