version: "3.9"
services:
  postgres:
    container_name: postgres_container
    image: postgres:17.4-alpine3.21

    environment:
      POSTGRES_DB: ${db_name}
      POSTGRES_USER: ${db_user}
      POSTGRES_PASSWORD: ${db_pswd}
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ./postgresql.conf:/etc/postgresql.conf
      - type: bind
        source: ${db_data}
        target: /var/lib/postgresql/data/pgdata
    command: 'postgres -c config_file="/etc/postgresql.conf"'  
    ports:
      - "${db_ports}"  
    networks:
      - postgres

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:9.2
    environment:
      PGADMIN_DEFAULT_EMAIL: ${pgadmin_email} 
      PGADMIN_DEFAULT_PASSWORD: ${pgadmin_pswd} 
      PGADMIN_CONFIG_SERVER_MODE: ${pgadmin_server_mode} 
    volumes:
      - ./postgresql.conf:/etc/postgresql.conf
      - type: bind
        source: ${pgadmin_data}
        target: /var/lib/pgadmin

    ports:
      - "${pgadmin_ports}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - postgres

  fast_api:
    container_name: backend
    build:
      context: ./
      dockerfile: ./app/Dockerfile      
    image: local_image/fast_api       
    environment:
      - TZ=${timezone}
      - app_logs=/app/logs   
      - log_level=${log_level}          
    volumes: 
      - app_code_source:/app/app
      - logs-store:/app/logs 
    command: >
        bash -c "python -m uvicorn backend.main:app --host 0.0.0.0 --port 81"         
    ports:
      - "${app_ports}"

  redis:
    container_name: redis_container  
    hostname: redis    
    image: redis:8.0-rc1-alpine3.21
    ports:
      - ${redis_port} 

volumes:

  app_code_source: 
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${app_code_source} 
  logs-store: 
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${logs_dir} 

  jupyter:
    build:
      context: ./docker/ 
      dockerfile: Dockerfile
      network: host      
      args:
         NB_USER: "${user}"
    user: root
    image: local_image/jupyter     
    working_dir: /home/${user}/work
    ports:
      - "${juputer_ports}" 
    volumes: 
    - type: bind
      source: ${notebook_folder}
      target: /home/${user}/work
    privileged: true   
      
    environment: 
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R    
      - restartable=yes 
      - TZ=${timezone} 
      - DOCKER_STACKS_JUPYTER_CMD=notebook
      - NB_USER=${user}
    #stdin_open: true
    #tty: true
    command: "start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''" 
networks:
  postgres:
    driver: bridge